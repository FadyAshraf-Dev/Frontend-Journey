<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Inventory Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-5">

<div class="container">
    <div class="mb-5 text-center text-md-start d-md-flex justify-content-between align-items-center">
        <div>
            <h1 class="fw-bold text-dark tracking-tight m-0">Inventory Dashboard</h1>
            <p class="text-muted m-0">Manage stock items, tracking variables, and pricing valuations locally.</p>
        </div>
        <div class="mt-3 mt-md-0" style="max-width: 300px; width: 100%;">
            <input type="text" id="search" class="form-control form-control-lg shadow-sm" placeholder="🔍 Search items...">
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-xl-4">
            <div class="card dashboard-card shadow-sm p-4">
                <h4 class="fw-bold text-dark mb-4">Add New Stock Element</h4>
                <form id="form" onsubmit="return false;">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary">Product Name</label>
                        <input type="text" id="name" class="form-control" placeholder="e.g., iPhone 15 Pro">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary">Price ($)</label>
                        <input type="number" id="price" class="form-control" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary">Stock Quantity</label>
                        <input type="number" id="quantity" class="form-control" placeholder="0" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary">Product Category</label>
                        <select id="category" class="form-select">
                            <option value="">-- Choose Category</option>
                            <option value="Phones">Phones</option>
                            <option value="TVs">TVs</option>
                            <option value="Tablets">Tablets</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-secondary">Manufacturer Brand</label>
                        <select id="brand" class="form-select">
                            <option value="">-- Choose Brand</option>
                            <option value="Apple">Apple</option>
                            <option value="Samsung">Samsung</option>
                            <option value="LG">LG</option>
                        </select>
                    </div>
                    <button id="add" type="button" class="btn btn-primary w-100 btn-lg rounded-3 fw-medium">Add to Stock List</button>
                </form>
            </div>
        </div>

        <div class="col-12 col-xl-8">
            <div class="card dashboard-card shadow-sm p-4 h-100">
                <h4 class="fw-bold text-dark mb-4">Stock Ledger Logs</h4>
                <div class="table-responsive border shadow-inner">
                    <table class="table table-hover m-0 align-middle">
                        <thead>
                            <tr>
                                <th style="width: 25%;">Item Name</th>
                                <th style="width: 15%;">Price</th>
                                <th style="width: 12%;">Qty</th>
                                <th style="width: 18%;">Category</th>
                                <th style="width: 15%;">Brand</th>
                                <th style="width: 15%; text-align: center;" colspan="2">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="table-group-divider">
                            </tbody>
                        <tfoot id="inventoryFoot">
                            </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js">
</script>

</body>
</html>
