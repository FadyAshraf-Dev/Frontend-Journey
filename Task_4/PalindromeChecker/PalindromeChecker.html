<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Palindrome Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center p-3">

    <div class="checker-card shadow-lg p-4 p-md-5 text-center">
        
        <div class="mb-4">
            <span class="fs-1">🔄</span>
            <h2 class="fw-bold text-dark mt-2">Palindrome Checker</h2>
            <p class="text-muted small">Type anything below to test if it reads the same backwards.</p>
        </div>

        <div class="mb-4">
            <input type="text" class="form-control form-control-lg text-center fw-semibold" placeholder="Enter a word or phrase..." id="textInput">
        </div>

        <div class="mt-3" style="min-height: 50px;">
            <p id="resultMessage" class="m-0"></p>
        </div>

    </div>

    <script src="script.js">
    </script>
</body>
</html>
