<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Customizer Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center p-3">

    <div class="card studio-card shadow-lg p-4 p-md-5">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark m-0">Typography Sandbox</h2>
            <p class="text-muted small">Tweak the controls below to style your copy interface in real-time.</p>
        </div>

        <div class="preview-box p-4 mb-4 shadow-inner">
            <p id="previewText" class="m-0 text-center fw-medium" style="font-size: 25px; color: #334155;">
                Enter Text To Replace This
            </p>
        </div>

        <div class="row g-3 align-items-center bg-light p-3 rounded-4 border m-0">
            
            <div class="col-12 col-md-5">
                <input type="text" id="textInput" class="form-control form-control-lg" placeholder="Type your text here...">
            </div>

            <div class="col-5 col-sm-4 col-md-3">
                <select id="sizeSelect" class="form-select form-select-lg">
                    <option value="16px">Small (S)</option>
                    <option value="25px" selected>Medium (M)</option>
                    <option value="40px">Large (L)</option>
                    <option value="60px">X-Large (XL)</option>
                </select>
            </div>

            <div class="col-5 col-sm-5 col-md-3">
                <select id="transformSelect" class="form-select form-select-lg">
                    <option value="none">Normal Text</option>
                    <option value="capitalize">Title Case</option>
                    <option value="uppercase">UPPERCASE</option>
                    <option value="lowercase">lowercase</option>
                </select>
            </div>

            <div class="col-2 col-sm-3 col-md-1 d-flex justify-content-center">
                <input type="color" id="colorInput" value="#334155" title="Choose text color">
            </div>

        </div>

    </div>

    <script src="script.js">
    </script>
</body>
</html>
