<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
<link rel="stylesheet" href="style.css">  </head>
  <body>
    <header>
      <div class="row">
        <div class="column">
          <p class="title" id="day"></p>
          <p class="info">day</p>
        </div>
        <div class="column">
          <p class="info">:</p>
        </div>
        <div class="column">
          <p class="title" id="hour"></p>
          <p class="info">hour</p>
        </div>
        <div class="column">
          <p class="info">:</p>
        </div>
        <div class="column">
          <p class="title" id="minute"></p>
          <p class="info">minute</p>
        </div>
        <div class="column">
          <p class="info">:</p>
        </div>
        <div class="column">
          <p class="title" id="second"></p>
          <p class="info">second</p>
        </div>
        <div class="column">
          <p class="info">:</p>
        </div>
        <div class="column">
          <p class="title" id="AMPM">AM</p>
          <p class="info">AM/PM</p>
        </div>
      </div>
    </header>
    <script src="script.js">
    </script>
  </body>
</html>
