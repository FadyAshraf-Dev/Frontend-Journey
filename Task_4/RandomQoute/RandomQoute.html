<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspirational Quote Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center p-3">

    <div class="card quote-card shadow-lg p-4 p-md-5 text-center">
        <div class="mb-4">
            <span class="fs-1 text-primary">“</span>
            <h2 class="fw-bold text-dark">Words of Wisdom</h2>
            <div class="badge bg-secondary id="modeBadge">Sequential Mode</div>
        </div>

        <div class="my-4">
            <p class="quote-text text-secondary fw-medium px-2">Click below to load your first inspiration baseline.</p>
        </div>

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-2">
            <button id="localBtn" class="btn btn-primary btn-lg px-4 gap-3 rounded-pill shadow-sm">Generate Local</button>
        </div>
    </div>

    <script src="script.js">

    </script>
</body>
</html>
